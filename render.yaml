# Render Blueprint - Backend Senegram + MySQL Aiven
# Renseigne MYSQL_URL avec le Service URI Aiven.

services:
  - type: web
    name: senegram-backend
    env: node
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    preDeployCommand: npm run db:init
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CLIENT_URL
        value: https://TON_APP.vercel.app
      - key: JWT_SECRET
        generateValue: true
      - key: MYSQL_URL
        sync: false
      - key: DB_SSL
        value: "true"
      - key: DB_CA_CERT
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        value: mailto:sarrfallou267@gmail.com
      # S3-compatible storage (Backblaze B2, R2, S3, Supabase)
      # Backblaze B2 example:
      # S3_ENDPOINT=https://s3.us-west-004.backblazeb2.com
      # S3_REGION=us-west-004
      # S3_ACCESS_KEY_ID=000000000000000000000001
      # S3_SECRET_ACCESS_KEY=K0000000000000000000000000000000000000000
      # S3_BUCKET=senegram-uploads
      # S3_PUBLIC_URL=https://f002.backblazeb2.com/file/senegram-uploads
      - key: S3_ENDPOINT
        sync: false
      - key: S3_REGION
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_PUBLIC_URL
        sync: false
